adapter_id: prompt
platform: "Portable Chat Prompt + Project Instructions (ChatGPT, Gemini, etc.)"
status: active

source_of_truth:
  prompt_spec: core/prompt-spec.md
  patterns: core/patterns.md
  examples: core/examples.md
  evaluation_cases: core/eval-cases.md
  evaluation_rubric: core/eval-rubric.md

deliverables:
  primary_instruction:
    path: adapters/prompt/humanize-russian-business-text.prompt.md
    role: самодостаточный prompt-entrypoint для обычных одноразовых чатов
  project_instruction:
    path: adapters/prompt/humanize-russian-business-text.instructions.md
    role: тонкий instructions-слой, который требует использовать основной prompt-файл в ChatGPT Projects, GPTs, Gemini Gems и похожих форматах
  references:
    - path: adapters/prompt/humanize-russian-business-text.patterns.md
      source: core/patterns.md
      role: reference-файл паттернов для чатов, проектов и Gems; усиливает калибровку, но не меняет стандарт
    - path: adapters/prompt/humanize-russian-business-text.examples.md
      source: core/examples.md
      role: reference-файл примеров для калибровки глубины правки в file-backed сценариях
  platform_config: []
  supporting_docs:
    - path: README.md
      role: пользовательская инструкция по quick chat, ChatGPT Projects и Gemini Gems

allowed_adapter_changes:
  - packaging
  - manual invocation wording
  - local reference loading instructions

forbidden_adapter_changes:
  - change editorial policy
  - soften hard constraints
  - redefine workflow
  - redefine expected tone
  - invent new allowed behavior
  - replace shared evaluation with adapter-only evaluation

validation_policy:
  evaluation_source: core
  release_gate: проверять основной prompt-файл, instructions-слой и reference-файлы на общем наборе кейсов при значимых изменениях core или prompt-слоя

notes:
  - Каноническая редакторская логика живёт только в core/.
  - `humanize-russian-business-text.prompt.md` предназначен для ручной вставки в обычные чаты и должен оставаться самодостаточным без обязательных ссылок на reference-файлы.
  - `humanize-russian-business-text.instructions.md` не должен дублировать prompt-спецификацию и должен требовать обязательного использования `humanize-russian-business-text.prompt.md`.
