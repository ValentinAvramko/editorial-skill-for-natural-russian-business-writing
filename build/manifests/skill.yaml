adapter_id: skill
platform: "Agent Skills (Codex, Claude Code)"
status: active

source_of_truth:
  prompt_spec: core/prompt-spec.md
  patterns: core/patterns.md
  examples: core/examples.md
  evaluation_cases: core/eval-cases.md
  evaluation_rubric: core/eval-rubric.md

deliverables:
  primary_instruction:
    path: adapters/skill/SKILL.md
    role: единый переносимый skill-entrypoint для агентных сред
  references:
    - path: adapters/skill/references/patterns.md
      source: core/patterns.md
      role: локальный справочник паттернов для runtime-распознавания
    - path: adapters/skill/references/examples.md
      source: core/examples.md
      role: локальный справочник примеров для калибровки глубины правки
  platform_config:
    - path: adapters/skill/agents/openai.yaml
      role: metadata интерфейса Codex/OpenAI
  supporting_docs:
    - path: README.md
      role: пользовательская инструкция по установке и вызову skill в Codex и Claude Code

allowed_adapter_changes:
  - packaging
  - metadata
  - activation wording
  - local reference loading instructions
  - platform-specific config

forbidden_adapter_changes:
  - change editorial policy
  - soften hard constraints
  - redefine workflow
  - redefine expected tone
  - replace shared evaluation with adapter-only evaluation

validation_policy:
  evaluation_source: core
  release_gate: проверять skill на общем наборе кейсов при значимых изменениях core, SKILL.md или references

notes:
  - Каноническая редакторская логика живёт только в core/.
  - Этот адаптер следует Agent Skills формату и предназначен для переносимого использования в Codex и Claude Code.
