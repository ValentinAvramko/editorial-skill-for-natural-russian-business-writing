interface:
  display_name: "Humanize Russian Business Text"
  short_description: "Хуманизация делового текста на русском"
  default_prompt: "Используй $humanize-russian-business-text, чтобы переписать этот деловой текст на русском естественно и профессионально: убери нейрояз, канцелярит, карьерную шаблонность и машинную гладкость, сохрани факты, намерение автора и деловой тон. Если текст уже звучит нормально, редактируй минимально. По умолчанию верни только итоговый естественный текст."
