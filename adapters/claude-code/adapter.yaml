adapter_id: claude-code
platform: Claude Code
status: active

source_of_truth:
  prompt_spec: ../../core/prompt-spec.md
  patterns: ../../core/patterns.md
  examples: ../../core/examples.md
  evaluation_cases: ../../core/eval-cases.md
  evaluation_rubric: ../../core/eval-rubric.md

deliverables:
  primary_instruction:
    path: SKILL.md
    role: основной skill-файл Claude Code для personal или project skills
  references:
    - path: references/patterns.md
      source: ../../core/patterns.md
      role: локальный справочник для распознавания AI-штампов, канцелярита и переисправления
    - path: references/examples.md
      source: ../../core/examples.md
      role: локальный набор примеров для калибровки глубины и тона правки
  platform_config: []

allowed_adapter_changes:
  - packaging
  - metadata
  - invocation wording
  - local reference loading rules

forbidden_adapter_changes:
  - change editorial policy
  - soften hard constraints
  - invent new allowed behavior
  - replace shared evaluation with adapter-only evaluation

validation_policy:
  evaluation_source: ../../core
  release_gate: держать адаптер синхронизированным с core и перепроверять на общем наборе кейсов при значимых изменениях

notes:
  - Для переносимого адаптера предпочтителен формат Claude Code Skills: ~/.claude/skills/<name>/SKILL.md или .claude/skills/<name>/SKILL.md.
  - CLAUDE.md остаётся полезным для общих project-wide инструкций, но этот адаптер упакован как skill.
