adapter_id: template
platform: "Delivery Type"
status: planned

source_of_truth:
  prompt_spec: ../../core/prompt-spec.md
  patterns: ../../core/patterns.md
  examples: ../../core/examples.md
  evaluation_cases: ../../core/eval-cases.md
  evaluation_rubric: ../../core/eval-rubric.md

deliverables:
  primary_instruction:
    path: TBD
    role: основной entrypoint адаптера
  references: []
  platform_config: []
  supporting_docs: []

allowed_adapter_changes:
  - packaging
  - metadata
  - invocation wording
  - local reference loading rules
  - install or usage docs
  - condensed or reorganized reference files

forbidden_adapter_changes:
  - change editorial policy
  - soften hard constraints
  - redefine workflow
  - invent new allowed behavior
  - replace core evaluation with adapter-only evaluation

validation_policy:
  evaluation_source: ../../core
  release_gate: проверить поведение адаптера на общем наборе кейсов перед переводом в active

notes:
  - Замените TBD на реальные файлы адаптера.
  - Держите адаптер тонким. Если изменение редакторское, сначала обновляйте core.
